name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          # Exact pin: setup-bun resolves floating versions via an
          # unauthenticated api.github.com tag listing, which GitHub-hosted
          # runners routinely get 503/rate-limited on (broke this repo's CI
          # 3 runs in a row). An exact version downloads directly instead.
          bun-version: "1.3.14"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Verify npm package contents
        run: npm run pack:dry-run

      - name: Verify generated changelog
        run: npm run changelog:check

      - name: Verify Bun can install the package graph
        run: bun install --no-save
